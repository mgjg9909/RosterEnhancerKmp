workflows:
  ios-sideload:
    name: "RosterEnhancer iOS - Sideload Build"
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        BUNDLE_ID: "com.matteo.rosterenhancer"
        XCODE_SCHEME: "iosApp"
        XCODE_WORKSPACE: "iosApp/iosApp.xcodeproj"
      xcode: "16"
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # 1. Compila il framework Kotlin Multiplatform per iOS ARM64
      - name: "Build KMP Framework (iOS ARM64)"
        script: |
          chmod +x gradlew
          ./gradlew :app:linkDebugFrameworkIosArm64

      # 2. Installa XcodeGen se non presente
      - name: "Install XcodeGen"
        script: |
          brew install xcodegen || true

      # 3. Genera il progetto Xcode dal project.yml
      - name: "Generate Xcode project"
        script: |
          cd iosApp
          xcodegen generate

      # 4. Imposta firma ad-hoc (sideloading, nessun account developer a pagamento richiesto)
      - name: "Sign for Sideload (ad-hoc)"
        script: |
          cd iosApp
          # Crea un certificato self-signed locale per la firma ad-hoc
          # Codemagic userà le variabili d'ambiente del keychain se configurate,
          # altrimenti firma con 'Sign to Run Locally'
          security find-identity -v -p codesigning || true

      # 5. Compila senza firma e crea IPA manualmente
      - name: "Build IPA for Sideload"
        script: |
          cd iosApp

          # Build senza code signing (Sideloadly/AltStore firmeranno sul PC dell'utente)
          xcodebuild build \
            -project iosApp.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$(pwd)/build/app"

          # Pacchettizza come IPA (formato standard: Payload/App.app zippato)
          mkdir -p build/output/Payload
          cp -r build/app/iosApp.app build/output/Payload/
          cd build/output
          zip -r RosterEnhancer.ipa Payload/
          echo "IPA creato con successo!"
          ls -la

    artifacts:
      - iosApp/build/output/*.ipa
      - iosApp/build/output/*.xcarchive
