workflows:
  ios-sideload:
    name: "RosterEnhancer iOS - Sideload Build"
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        BUNDLE_ID: "com.matteo.rosterenhancer"
        XCODE_SCHEME: "iosApp"
        XCODE_WORKSPACE: "iosApp/iosApp.xcodeproj"
      xcode: "16"
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: "Build KMP Framework (iOS ARM64)"
        script: |
          set -e
          chmod +x gradlew
          ./gradlew :app:linkDebugFrameworkIosArm64

      - name: "Install XcodeGen"
        script: |
          set -e
          brew install xcodegen || true

      - name: "Generate Xcode project"
        script: |
          set -e
          cd iosApp
          xcodegen generate

      - name: "Sign for Sideload (ad-hoc)"
        script: |
          set -e
          cd iosApp
          security find-identity -v -p codesigning || true

      - name: "Build IPA for Sideload"
        script: |
          set -e
          cd iosApp

          xcodebuild build \
            -project iosApp.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$(pwd)/build/app" | tee xcodebuild.log

          mkdir -p build/output/Payload
          cp -r build/app/iosApp.app build/output/Payload/
          cd build/output
          zip -r RosterEnhancer.ipa Payload/
          echo "IPA creato con successo!"
          ls -la

    artifacts:
      - iosApp/xcodebuild.log
      - iosApp/build/output/*.ipa
      - iosApp/build/output/*.xcarchive